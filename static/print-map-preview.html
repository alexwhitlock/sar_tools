<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Map Preview</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; font-family: Arial, sans-serif; }

    /* Fixed layout so Leaflet always gets a concrete pixel size */
    #map {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      right: 230px;
    }

    #panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 230px;
      display: flex;
      flex-direction: column;
      padding: 14px 12px 12px;
      border-left: 2px solid #cc5e31;
      background: #f9f9f9;
      overflow-y: auto;
      gap: 10px;
    }

    .panel-title  { font-size: 1rem; font-weight: 700; color: #cc5e31; line-height: 1.2; }
    .detail-row   { font-size: 0.75rem; color: #555; }

    .section {
      border-top: 1px solid #ddd;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }
    .option-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.83rem;
      color: #333;
      cursor: pointer;
    }

    .spacer { flex: 1; }

    #generateBtn {
      padding: 10px;
      background: #cc5e31;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    #generateBtn:hover    { background: #b04e25; }
    #generateBtn:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <div id="panelTitle"   class="panel-title">Loading…</div>
    <div id="panelDetails"></div>
    <div id="vertexSection" class="section" style="display:none">
      <div class="section-title">Options</div>
      <label class="option-label">
        <input type="checkbox" id="showVertices"> Vertex coordinates
      </label>
    </div>
    <div class="spacer"></div>
    <button id="generateBtn" disabled>Loading…</button>
  </div>

  <script>
    let _map, _vertexLayer, _geometry, _title, _detailStr, _vertices;

    // Use window load (not DOMContentLoaded) so Leaflet CSS from CDN is
    // fully applied before we measure the map container size.
    window.addEventListener("load", () => {
      const raw = new URLSearchParams(location.search).get("asgn");
      if (!raw) {
        document.getElementById("panelTitle").textContent = "No assignment data.";
        return;
      }
      try { init(JSON.parse(raw)); }
      catch (e) { document.getElementById("panelTitle").textContent = "Error: " + e.message; }
    });

    function init(asgn) {
      _geometry = asgn.geometry;
      const isArea = _geometry?.type === "Polygon";
      _title = "Assignment " + (asgn.number ?? "?");

      const detailParts = [
        asgn.team          ? "Team: "      + asgn.team          : null,
        asgn.assignmentType? "Type: "      + asgn.assignmentType: null,
        asgn.resourceType  ? "Resource: "  + asgn.resourceType  : null,
        asgn.op            ? "Op Period: " + asgn.op            : null,
        asgn.status        ? "Status: "    + asgn.status        : null,
      ].filter(Boolean);
      _detailStr = detailParts.join("  \u00b7  ");
      _vertices  = isArea ? _geometry.coordinates[0].slice(0, -1) : [];

      // Update panel text
      document.title = "Map: " + _title;
      document.getElementById("panelTitle").textContent = _title;
      document.getElementById("panelDetails").innerHTML =
        detailParts.map(d => '<div class="detail-row">' + d + "</div>").join("");

      if (isArea) document.getElementById("vertexSection").style.display = "";

      // Init Leaflet
      _map = L.map("map");
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "\u00a9 OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(_map);

      const layer = L.geoJSON(_geometry, {
        style: { color: "#cc5e31", weight: 3.5, fill: false },
      }).addTo(_map);
      _map.fitBounds(layer.getBounds(), { padding: [40, 40] });
      // Force Leaflet to remeasure the container after layout settles
      setTimeout(() => _map.invalidateSize({ animate: false }), 100);

      // Vertex markers layer
      _vertexLayer = L.layerGroup().addTo(_map);
      const checkbox = document.getElementById("showVertices");
      checkbox.addEventListener("change", () => _setVertexMarkers(checkbox.checked));

      // Wire generate button
      const btn = document.getElementById("generateBtn");
      btn.textContent = "Generate PDF";
      btn.disabled = false;
      btn.addEventListener("click", _generate);
    }

    function _setVertexMarkers(show) {
      _vertexLayer.clearLayers();
      if (!show) return;
      _vertices.forEach(([lon, lat], i) => {
        const icon = L.divIcon({
          className: "",
          html: '<div style="width:22px;height:22px;border-radius:50%;background:#cc5e31;'
              + 'color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;'
              + 'justify-content:center;border:2px solid #fff;'
              + 'box-shadow:0 1px 4px rgba(0,0,0,.4)">' + (i + 1) + "</div>",
          iconSize: [22, 22], iconAnchor: [11, 11],
        });
        L.marker([lat, lon], { icon }).addTo(_vertexLayer);
      });
    }

    async function _generate() {
      const btn = document.getElementById("generateBtn");
      btn.disabled = true;
      btn.textContent = "Generating\u2026";

      const center       = _map.getCenter();
      const zoom         = Math.round(_map.getZoom());
      const showVertices = document.getElementById("showVertices")?.checked ?? false;

      try {
        const resp = await fetch("/api/assignment/map-pdf", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            geometry:      _geometry,
            title:         _title,
            details:       _detailStr,
            center:        [center.lng, center.lat],
            zoom,
            show_vertices: showVertices,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          alert("Failed to generate PDF: " + (err.error ?? resp.statusText));
          return;
        }

        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const now  = new Date();
        const ts   = now.getFullYear()
          + String(now.getMonth() + 1).padStart(2, "0")
          + String(now.getDate()).padStart(2, "0")
          + "_" + String(now.getHours()).padStart(2, "0")
          + String(now.getMinutes()).padStart(2, "0");
        const filename = _title.replace(/\s+/g, "_") + "_" + ts + ".pdf";

        const a    = document.createElement("a");
        a.href     = url;
        a.download = filename;
        a.click();

        window.open(url, "_blank");
        setTimeout(() => URL.revokeObjectURL(url), 60_000);
      } finally {
        btn.disabled    = false;
        btn.textContent = "Generate PDF";
      }
    }
  </script>
</body>
</html>
