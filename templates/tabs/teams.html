<div id="teams" class="tab-panel">
  <div class="tab-content">

    <!-- Toolbar -->
    <div class="teams-toolbar">
      <div id="teams-message" class="message-bar info hidden"></div>
      <span id="cv-legend-unchecked" class="cv-legend-unchecked hidden">
        <span class="cv-status-dot cv-status-out"></span> Not Checked In
      </span>
      <button id="team-add" class="teams-toolbar-btn" title="Create Team" disabled>+ Team</button>
      <div class="view-toggle">
        <button id="view-table-btn"  class="view-toggle-btn active" title="Table view">Table</button>
        <button id="view-kanban-btn" class="view-toggle-btn"        title="Kanban view">Kanban</button>
        <button id="view-card-btn"   class="view-toggle-btn"        title="Card view">Card</button>
      </div>
    </div>

    <!-- Search + filters -->
    <div class="teams-filters">
      <div class="filter-group" id="teams-search-group">
        <label>Search</label>
        <input type="text" id="teams-search" placeholder="Search name, TL, assignment…" />
      </div>

      <!-- Status pills (table only) -->
      <div class="filter-group" id="teams-status-filter-group">
        <label>Status</label>
        <div class="pill-group teams-pill-group" data-filter-key="status">
          <label class="pill ts-oos"><input type="checkbox" value="Out of Service"> Out of Service</label>
          <label class="pill ts-staged"><input type="checkbox" value="Staged"> Staged</label>
          <label class="pill ts-briefed"><input type="checkbox" value="Briefed"> Briefed</label>
          <label class="pill ts-travelling"><input type="checkbox" value="Travelling to Assignment"> Travelling</label>
          <label class="pill ts-on-assignment"><input type="checkbox" value="On Assignment"> On Assignment</label>
          <label class="pill ts-returning"><input type="checkbox" value="Returning from Assignment"> Returning</label>
          <label class="pill ts-debrief"><input type="checkbox" value="Awaiting Debrief"> Awaiting Debrief</label>
          <label class="pill ts-retired"><input type="checkbox" value="Retired"> Retired</label>
        </div>
      </div>

      <!-- Column toggles (table only) -->
      <div class="filter-group filter-group-check" id="teams-col-toggles" style="margin-left: auto;">
        <label class="check-label">
          <input type="checkbox" id="toggle-members" />
          Show All Team Members
        </label>
        <label class="check-label">
          <input type="checkbox" id="toggle-notes-teams" checked />
          Notes
        </label>
      </div>
    </div>

    <!-- Table view -->
    <div id="teams-table-view" class="table-container teams-table-container">
      <table class="data-table teams-data-table">
        <thead>
          <tr>
            <th data-key="name">Team Name</th>
            <th data-key="status">Status</th>
            <th data-key="teamLeaderName">Team Leader</th>
            <th data-key="memberCount">Members</th>
            <th data-key="memberNames" class="col-members">Member Names</th>
            <th data-key="assignment">Assignment</th>
            <th data-key="notes" class="col-notes">Notes</th>
            <th data-key="actions" class="actions-col"></th>
          </tr>
        </thead>
        <tbody id="teams-body">
          <!-- populated dynamically -->
        </tbody>
      </table>
    </div>

    <!-- Kanban view -->
    <div id="teams-kanban-view" class="teams-kanban hidden">
      <!-- columns generated by JS -->
    </div>

    <!-- Card view -->
    <div id="teams-card-view" class="teams-card-view hidden">
      <!-- rendered by JS -->
    </div>

    <!-- ================================================= -->
    <!-- Shared UI elements                                 -->
    <!-- ================================================= -->

    <!-- Kebab popup menu -->
    <div id="teamMenu" class="popup-menu hidden" role="menu" aria-label="Team actions">
      <button type="button" class="menu-item" data-action="edit" role="menuitem">Edit</button>
      <button type="button" class="menu-item danger" data-action="delete" role="menuitem">Delete</button>
    </div>

    <!-- Create / Edit Team modal -->
    <div id="teamModalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal team-modal" role="dialog" aria-modal="true" aria-labelledby="teamModalTitle">
        <div class="modal-header">
          <div id="teamModalTitle" class="modal-title">Create Team</div>
          <button type="button" id="teamModalClose" class="modal-close" aria-label="Close">✕</button>
        </div>

        <div class="modal-body team-modal-body">
          <label>Team Name
            <input id="teamName" type="text" />
          </label>

          <label>Status
            <select id="teamStatus">
              <option value="Out of Service">Out of Service</option>
              <option value="Staged">Staged</option>
              <option value="Briefed">Briefed</option>
              <option value="Travelling to Assignment">Travelling to Assignment</option>
              <option value="On Assignment">On Assignment</option>
              <option value="Returning from Assignment">Returning from Assignment</option>
              <option value="Awaiting Debrief">Awaiting Debrief</option>
              <option value="Retired">Retired</option>
            </select>
          </label>

          <label>Notes
            <textarea id="teamNotes" rows="3" placeholder="Optional notes"></textarea>
          </label>

          <label>Team Leader
            <select id="teamLeader">
              <option value="">— None —</option>
            </select>
          </label>

          <div class="team-members-section">
            <div class="team-members-header">
              <span class="team-members-label">Members</span>
            </div>
            <div id="teamMembersList" class="team-members-list"></div>
            <div class="team-members-add">
              <select id="teamMemberAdd">
                <option value="">— Add member —</option>
              </select>
            </div>
          </div>
        </div>

        <div id="teamModalError" class="modal-error hidden"></div>
        <div class="modal-footer">
          <button type="button" id="teamModalCancel">Cancel</button>
          <button type="button" id="teamModalSave">Save</button>
        </div>
      </div>
    </div>

  </div>
</div>
