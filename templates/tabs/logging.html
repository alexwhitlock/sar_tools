<div id="logging" class="tab-panel">
  <div class="tab-content logging-tab-content">

    <!-- Sub-tab buttons -->
    <div class="logging-subtab-bar">
      <button class="logging-subtab-btn active" data-subtab="comms-log">Comms Log</button>
      <button class="logging-subtab-btn" data-subtab="view-log">View Log</button>
    </div>

    <!-- ============================================================ -->
    <!-- COMMS LOG sub-tab                                            -->
    <!-- ============================================================ -->
    <div id="subtab-comms-log" class="logging-subtab-panel">
      <div class="comms-layout">

        <!-- LEFT 1/3: log history + compose -->
        <div class="comms-left">

          <div class="comms-log-display">
            <div id="comms-log-entries" class="comms-log-entries">
              <div class="log-empty">No incident selected.</div>
            </div>
          </div>

          <div class="comms-compose">
            <textarea
              id="comms-message-input"
              class="comms-message-input"
              rows="3"
              placeholder="Enter message or build with buttons..."
              autocomplete="off"
            ></textarea>
            <button type="button" id="comms-log-btn">LOG</button>
          </div>

        </div><!-- /comms-left -->

        <!-- RIGHT 2/3: role + button builder -->
        <div class="comms-builder">

          <!-- Role selector — touch-friendly toggle buttons -->
          <div class="builder-section">
            <div class="builder-label">Role</div>
            <div class="builder-buttons role-buttons">
              <button type="button" class="builder-btn role-btn active" data-role="COMMS">COMMS</button>
              <button type="button" class="builder-btn role-btn" data-role="IC">IC</button>
              <button type="button" class="builder-btn role-btn" data-role="OPS">OPS</button>
              <button type="button" class="builder-btn role-btn" data-role="PLANS">PLANS</button>
              <button type="button" class="builder-btn role-btn" data-role="OTHER">OTHER</button>
            </div>
          </div>

          <!-- Connectors -->
          <div class="builder-section">
            <div class="builder-label">Connectors</div>
            <div class="builder-buttons">
              <button type="button" class="builder-btn" data-insert="FROM ">FROM</button>
              <button type="button" class="builder-btn" data-insert="TO ">TO</button>
              <button type="button" class="builder-btn" data-insert="VIA ">VIA</button>
              <button type="button" class="builder-btn" data-insert="AT ">AT</button>
              <button type="button" class="builder-btn" data-insert=": ">:</button>
            </div>
          </div>

          <!-- Entities -->
          <div class="builder-section">
            <div class="builder-label">Entities</div>
            <div class="builder-buttons" id="comms-entity-buttons">
              <!-- Team buttons injected here by JS -->
              <button type="button" class="builder-btn" data-insert="COMMAND ">COMMAND</button>
              <button type="button" class="builder-btn" data-insert="BASE ">BASE</button>
              <button type="button" class="builder-btn" data-insert="COMMS ">COMMS</button>
              <button type="button" class="builder-btn" data-insert="OPS ">OPS</button>
              <button type="button" class="builder-btn" data-insert="MEDIC ">MEDIC</button>
            </div>
          </div>

          <!-- Quick Messages -->
          <div class="builder-section">
            <div class="builder-label">Quick Messages</div>
            <div class="builder-buttons builder-buttons-grid">
              <button type="button" class="builder-btn builder-btn-msg" data-insert="LEAVING FOR ASSIGNMENT">LEAVING FOR ASSIGNMENT</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="ARRIVED AT ASSIGNMENT">ARRIVED AT ASSIGNMENT</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="RETURNING TO BASE">RETURNING TO BASE</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="ARRIVED AT BASE">ARRIVED AT BASE</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="IN CONTACT WITH SUBJECT">IN CONTACT WITH SUBJECT</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="SUBJECT FOUND">SUBJECT FOUND</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="ALL CLEAR">ALL CLEAR</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="REQUESTING MEDICAL">REQUESTING MEDICAL</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="RADIO CHECK OK">RADIO CHECK OK</button>
              <button type="button" class="builder-btn builder-btn-msg" data-insert="NO CONTACT">NO CONTACT</button>
            </div>
          </div>

        </div><!-- /comms-builder -->
      </div><!-- /comms-layout -->
    </div><!-- /subtab-comms-log -->

    <!-- ============================================================ -->
    <!-- VIEW LOG sub-tab                                             -->
    <!-- ============================================================ -->
    <div id="subtab-view-log" class="logging-subtab-panel hidden">

      <div class="viewlog-toolbar">
        <input type="text" id="viewlog-search" placeholder="Search log..." />
        <select id="viewlog-type-filter" title="Filter by type">
          <option value="">All types</option>
          <option value="comms">Comms</option>
          <option value="system">System</option>
          <option value="note">Note</option>
          <option value="task">Task</option>
        </select>
        <button type="button" id="viewlog-export-btn">Export CSV</button>
      </div>

      <div class="viewlog-table-container">
        <table class="data-table viewlog-table">
          <thead>
            <tr>
              <th style="width:7rem">Time</th>
              <th style="width:5rem">Role</th>
              <th style="width:5rem">Type</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="viewlog-body">
          </tbody>
        </table>
      </div>

    </div><!-- /subtab-view-log -->

  </div><!-- /tab-content -->
</div><!-- /logging tab-panel -->
