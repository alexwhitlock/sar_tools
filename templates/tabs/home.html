<div id="home" class="tab-panel active">
  <div class="home-dashboard">

    <div class="home-grid">

      <div class="home-card">
        <h2>Incident</h2>

        <div class="form-row">
          <label for="incidentSelect">Current Incident</label>
          <select id="incidentSelect"></select>
        </div>

        <div class="form-row">
          <label for="incidentNewName">New Incident</label>
          <input
            type="text"
            id="incidentNewName"
            placeholder="e.g. 2026-001 Gatineau Park"
            autocomplete="off"
          />
          <button id="incidentCreateBtn" type="button">Create</button>
        </div>

        <div class="message-bar hidden" id="incidentHint"></div>

        <div class="incident-db-row">
          <button id="incidentRenameBtn" type="button" disabled>Rename</button>
          <button id="incidentExportBtn" type="button" disabled>Export</button>
          <button id="incidentImportBtn" type="button">Import</button>
          <input type="file" id="incidentImportFile" accept=".sqlite3" style="display:none">
        </div>
      </div>

      <div class="home-card card-caltopo">
        <div class="card-header">
          <h2>CalTopo</h2>
          <label class="link-label" id="caltopoLinkRow" style="display:none">
            <input type="checkbox" id="caltopoLinkCheck" />
            Link to Incident
          </label>
        </div>

        <div class="form-row">
          <label for="mapId">CalTopo Map ID</label>
          <input
            type="text"
            id="mapId"
            placeholder="e.g. APC1GE5"
            autocomplete="off"
          />
          <button id="mapIdLookupBtn" type="button" class="lookup-btn" title="Look up map">Apply</button>
        </div>

        <div class="form-row caltopo-mode-row">
          <label>Mode</label>
          <div class="caltopo-mode-options">
            <label class="mode-option"><input type="radio" name="caltopoMode" value="online"  checked /> Online (caltopo.com)</label>
            <label class="mode-option"><input type="radio" name="caltopoMode" value="offline"         /> Offline (localhost:8080)</label>
          </div>
        </div>

        <div class="message-bar hidden" id="caltopoHint"></div>
      </div>

      <div class="home-card card-d4h">
        <div class="card-header">
          <h2>D4H Activity</h2>
          <label class="link-label" id="d4hLinkRow" style="display:none">
            <input type="checkbox" id="d4hLinkCheck" />
            Link to Incident
          </label>
        </div>

        <div class="form-row">
          <label for="d4h_activity">D4H Activity ID</label>
          <input
            type="text"
            id="d4h_activity"
            placeholder="e.g. 327349"
            autocomplete="off"
          />
          <button id="d4hLookupBtn" type="button" class="lookup-btn" title="Look up activity">Apply</button>
        </div>

        <div class="message-bar hidden" id="d4hHint"></div>
      </div>

    </div>
  </div>
</div>
