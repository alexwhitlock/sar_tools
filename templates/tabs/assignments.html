<div id="assignments" class="tab-panel">
  <div class="tab-content">

    <!-- Toolbar -->
    <div class="assignments-toolbar">
      <div id="assignments-message" class="message-bar info hidden"></div>
      <div class="view-toggle">
        <button id="asgn-view-table-btn" class="view-toggle-btn active" title="Table view">Table</button>
        <button id="asgn-view-kanban-btn" class="view-toggle-btn" title="Kanban view">Kanban</button>
      </div>
    </div>

    <!-- Filters (table view only) -->
    <div class="assignments-filters" id="assignments-filters-row">

      <!-- Text filters -->
      <div class="filter-group">
        <label>Assignment #</label>
        <input type="text" id="filter-number" placeholder="e.g. 12" />
      </div>

      <div class="filter-group">
        <label>Team</label>
        <input type="text" id="filter-team" placeholder="e.g. C" />
      </div>

      <!-- Resource pills -->
      <div class="filter-group">
        <label>Resource</label>
        <div class="pill-group" data-filter-key="resourceType">
          <label class="pill"><input type="checkbox" value="GROUND"> Ground</label>
          <label class="pill"><input type="checkbox" value="AIR"> Air</label>
          <label class="pill"><input type="checkbox" value="DOG"> Dog</label>
          <label class="pill"><input type="checkbox" value="BIKE"> Bike</label>
          <label class="pill"><input type="checkbox" value="OHV"> OHV</label>
        </div>
      </div>

      <!-- Status pills -->
      <div class="filter-group">
        <label>Status</label>
        <div class="pill-group" data-filter-key="status">
          <label class="pill status-draft"><input type="checkbox" value="DRAFT"> Draft</label>
          <label class="pill status-prepared"><input type="checkbox" value="PREPARED"> Prepared</label>
          <label class="pill status-inprogress"><input type="checkbox" value="INPROGRESS"> In Progress</label>
          <label class="pill status-completed"><input type="checkbox" value="COMPLETED"> Completed</label>
        </div>
      </div>

      <!-- Column toggles -->
      <div class="filter-group filter-group-check">
        <label class="check-label">
          <input type="checkbox" id="toggle-team-status" />
          Team Status
        </label>
      </div>

      <div class="filter-group filter-group-check">
        <label class="check-label">
          <input type="checkbox" id="toggle-op-period" />
          Op Period
        </label>
        <input type="text" id="filter-op" placeholder="e.g. 1" />
      </div>

      <div class="filter-group filter-group-check">
        <label class="check-label">
          <input type="checkbox" id="toggle-notes-assignments" checked />
          Notes
        </label>
      </div>

    </div>

    <!-- Table view -->
    <div class="table-container assignments-table-container" id="assignments-table-view">
      <table class="data-table assignments-data-table">
        <thead>
          <tr>
            <th data-key="number">Assignment #</th>
            <th data-key="team">Team</th>
            <th data-key="assignmentType">Type</th>
            <th data-key="resourceType">Resource</th>
            <th data-key="status">Status</th>
            <th data-key="teamStatus" class="col-team-status">Team Status</th>
            <th data-key="op" class="col-op-period">Op Period</th>
            <th data-key="notes" class="col-notes">Notes</th>
            <th class="actions-col"></th>
          </tr>
        </thead>
        <tbody id="assignments-body">
          <!-- populated dynamically -->
        </tbody>
      </table>
    </div>

    <!-- Kanban view -->
    <div id="assignments-kanban-view" class="assignments-kanban hidden">
      <!-- columns generated by JS -->
    </div>

    <!-- Kebab popup menu -->
    <div id="asgnMenu" class="popup-menu hidden" role="menu" aria-label="Assignment actions">
      <button type="button" class="menu-item" data-action="edit"      role="menuitem">Edit</button>
      <button type="button" class="menu-item" data-action="print-map" role="menuitem">Print Map</button>
    </div>

    <!-- Edit assignment modal -->
    <div id="asgnModalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal asgn-modal" role="dialog" aria-modal="true" aria-labelledby="asgnModalTitle">
        <div class="modal-header">
          <div id="asgnModalTitle" class="modal-title">Edit Assignment</div>
          <button type="button" id="asgnModalClose" class="modal-close" aria-label="Close">✕</button>
        </div>
        <div class="modal-body asgn-modal-body">
          <div class="asgn-modal-info" id="asgnModalInfo"></div>
          <label>Status
            <select id="asgnStatus">
              <option value="DRAFT">Draft</option>
              <option value="PREPARED">Prepared</option>
              <option value="INPROGRESS">In Progress</option>
              <option value="COMPLETED">Completed</option>
            </select>
          </label>
          <label>Team
            <select id="asgnTeam">
              <option value="">— No Team —</option>
            </select>
          </label>
          <label>Notes
            <textarea id="asgnNotes" rows="3" placeholder="Optional notes"></textarea>
          </label>
        </div>
        <div id="asgnModalError" class="modal-error hidden"></div>
        <div class="modal-footer">
          <button type="button" id="asgnModalPrint">Print Map</button>
          <button type="button" id="asgnModalCancel">Cancel</button>
          <button type="button" id="asgnModalSave">Save</button>
        </div>
      </div>
    </div>

  </div>
</div>
