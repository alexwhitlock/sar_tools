<div id="personnel" class="tab-panel">
  <div class="tab-content">
    <!-- Top row: message + reload -->
    <div class="personnel-toolbar">

      <div id="personnel-message" class="message-bar info hidden"></div>

      <button
        id="person-add"
        class="personnel-toolbar-btn"
        title="Add Person">
        + Person
      </button>

      <button
        id="d4h-add"
        class="personnel-toolbar-btn"
        title="Add from D4H">
        Add from D4H
      </button>

    </div>

    <div class="personnel-filters">

      <!-- Text filters -->
      <div class="filter-group">
        <label>Name</label>
        <input type="text" id="filter-name" placeholder="e.g. John" />
      </div>

      <div class="filter-group">
        <label>Team</label>
        <input type="text" id="personnel-filter-team" placeholder="e.g. C" />
      </div>

      <!-- Team assignment pills -->
      <div class="filter-group">
        <label>Team Status</label>
        <div class="pill-group" data-filter-key="teamFilter">
          <label class="pill"><input type="checkbox" value="Assigned"> Assigned</label>
          <label class="pill"><input type="checkbox" value="Unassigned"> Unassigned</label>
        </div>
      </div>

      <!-- Status pills -->
      <div class="filter-group">
        <label>Status</label>
        <div class="pill-group" data-filter-key="status">
          <label class="pill status-added"><input type="checkbox" value="Added"> Added</label>
          <label class="pill status-checkedin"><input type="checkbox" value="Checked In"> Checked In</label>
          <label class="pill status-checkedout"><input type="checkbox" value="Checked Out"> Checked Out</label>
        </div>
      </div>

      <!-- Column toggles -->
      <div class="filter-group filter-group-check">
        <label class="check-label">
          <input type="checkbox" id="toggle-d4href" />
          D4H Ref
        </label>
      </div>

      <div class="filter-group filter-group-check">
        <label class="check-label">
          <input type="checkbox" id="toggle-notes-personnel" checked />
          Notes
        </label>
      </div>

      <div id="personnel-stats" class="personnel-stats hidden">
        <span id="stat-total"></span>
        <span id="stat-checkedin"></span>
        <span id="stat-checkedout"></span>
      </div>

    </div>

    <!-- scroll container -->
    <div class="table-container personnel-table-container">
      <table class="data-table personnel-data-table">
        <thead>
          <tr>
            <th data-key="name">Name</th>
            <th data-key="team">Team</th>
            <th data-key="status">Status</th>
            <th data-key="source">Source</th>
            <th data-key="d4hRef" class="col-d4href">D4H Ref</th>
            <th data-key="notes" class="col-notes">Notes</th>
            <th data-key="actions" class="actions-col"></th>
          </tr>
        </thead>

        <tbody id="personnel-body">
          <!-- populated dynamically -->
          <!-- Example row your JS should render:
          <tr>
            <td>John Smith</td>
            <td>C</td>
            <td class="actions-cell">
              <button type="button" class="person-menu-btn" data-person-id="123" title="Actions">⋮</button>
            </td>
          </tr>
          -->
        </tbody>
      </table>
    </div>

    <!-- ================================================= -->
    <!-- Shared UI elements (ONE copy only) -->
    <!-- ================================================= -->

    <!-- Kebab popup menu (text only) -->
    <div id="personMenu" class="popup-menu hidden" role="menu" aria-label="Person actions">
      <button type="button" class="menu-item" data-action="check-in" role="menuitem">Check In</button>
      <button type="button" class="menu-item" data-action="undo-check-in" role="menuitem">Undo Check In</button>
      <button type="button" class="menu-item" data-action="check-out" role="menuitem">Check Out</button>
      <button type="button" class="menu-item" data-action="edit" role="menuitem">Edit</button>
      <button type="button" class="menu-item danger" data-action="delete" role="menuitem">Delete</button>
    </div>

    <!-- Add/Edit Person modal -->
    <div id="personModalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="personModalTitle">
        <div class="modal-header">
          <div id="personModalTitle" class="modal-title">Add Person</div>
          <button type="button" id="personModalClose" class="modal-close" aria-label="Close">✕</button>
        </div>

        <div class="modal-body">
          <label>Name
            <input id="personName" type="text" />
          </label>
          <label>Team
            <select id="personTeam">
              <option value="">— No Team —</option>
            </select>
          </label>
          <label>Notes
            <textarea id="personNotes" rows="3" placeholder="Optional notes"></textarea>
          </label>
        </div>

        <div id="personModalError" class="modal-error hidden"></div>
        <div class="modal-footer">
          <button type="button" id="personModalCancel">Cancel</button>
          <button type="button" id="personModalSave">Save</button>
        </div>
      </div>
    </div>

    <!-- D4H Conflict Resolution Modal -->
    <div id="conflictModalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal conflict-modal" role="dialog" aria-modal="true" aria-labelledby="conflictModalTitle">
        <div class="modal-header">
          <div id="conflictModalTitle" class="modal-title">Resolve Import Conflicts</div>
          <button type="button" id="conflictModalClose" class="modal-close" aria-label="Close">✕</button>
        </div>
        <div class="modal-body conflict-modal-body">
          <p id="conflictSummary" class="conflict-summary"></p>
          <div id="conflictList" class="conflict-list"></div>
          <div id="removedSection" class="hidden">
            <p class="conflict-summary removed-summary">Not in D4H attending list — check any to remove from the database:</p>
            <div id="removedList" class="conflict-list"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="conflictModalCancel">Cancel</button>
          <button type="button" id="conflictModalImport">OK</button>
        </div>
      </div>
    </div>

  </div>
</div>
