<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Dashboard — SAR Tools</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 15px;
}

/* ── Header ── */
.dash-header {
  background: #1e293b;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  height: 40px;
  flex-shrink: 0;
  gap: 1.5rem;
}

.dash-logo {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #64748b;
  white-space: nowrap;
}

.dash-incident {
  font-size: 0.95rem;
  font-weight: 700;
  color: #f1f5f9;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-clock {
  font-size: 0.95rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #f1f5f9;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

/* ── Offline banner ── */
.dash-offline-banner {
  display: none;
  background: #dc2626;
  color: #fff;
  text-align: center;
  font-weight: 700;
  font-size: 0.8rem;
  padding: 0.25rem;
  flex-shrink: 0;
}
.dash-offline-banner.visible { display: block; }

/* ── Main ── */
.dash-main {
  flex: 1;
  display: flex;
  gap: 0.65rem;
  padding: 0.65rem;
  min-height: 0;
}

/* ── Section panels ── */
.dash-panel {
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.dash-panel-header {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  padding: 0.45rem 0.9rem;
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
  flex-shrink: 0;
}

.dash-panel-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: #475569;
}

.dash-panel-count {
  font-size: 0.72rem;
  color: #94a3b8;
}

.dash-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 0.4rem;
  min-height: 0;
}

/* ── Teams column (fixed width) ── */
.dash-teams-col { flex: 0 0 400px; }

/* ── Assignments column (fills rest) ── */
.dash-asgn-col { flex: 1; }

/* ── Team cards ── */
.team-card {
  border-radius: 4px;
  margin-bottom: 3px;
  overflow: hidden;
  border: 1px solid transparent;
}

.team-card-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 5px 8px;
  color: #fff;
}

.team-card-name {
  font-size: 1.05rem;
  font-weight: 800;
  min-width: 1.1rem;
  line-height: 1;
  flex-shrink: 0;
}

.team-card-status {
  font-size: 0.72rem;
  font-weight: 700;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.team-card-details {
  display: flex;
  flex-shrink: 0;
}

.team-card-detail {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  white-space: nowrap;
  font-size: 0.72rem;
  padding: 0 0.5rem;
}

.team-card-detail-label {
  font-size: 0.55rem;
  opacity: 0.65;
  line-height: 1;
  margin-bottom: 1px;
}

.team-card-detail-tl {
  width: 150px;
}

.team-card-detail-asgn {
  width: 55px;
}

.team-card-detail-members {
  width: 36px;
  align-items: center;
}

/* TL name ellipsis */
.team-card-detail-tl-value {
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Scroll loop separator */
.teams-scroll-separator {
  height: 2px;
  background: #cbd5e1;
  margin: 3px 0 4px;
  opacity: 0.55;
  border-radius: 1px;
}


/* ── Team status colors ── */
.ts-oos         { background: #757575; border-color: #757575; }
.ts-staged      { background: #1565c0; border-color: #1565c0; }
.ts-briefed     { background: #00838f; border-color: #00838f; }
.ts-travelling  { background: #e65100; border-color: #e65100; }
.ts-on          { background: #2e7d32; border-color: #2e7d32; }
.ts-returning   { background: #6a1b9a; border-color: #6a1b9a; }
.ts-debrief     { background: #f57f17; border-color: #f57f17; }
.ts-retired     { background: #37474f; border-color: #37474f; }

/* ── Assignment status tiles ── */
.asgn-tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.6rem;
  margin-bottom: 1rem;
}

.asgn-tile {
  border-radius: 8px;
  padding: 0.9rem 0.75rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  color: #fff;
}

.asgn-tile-count {
  font-size: 2.8rem;
  font-weight: 800;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.asgn-tile-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  opacity: 0.92;
}

/* ── In-progress list ── */
.asgn-section-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #64748b;
  margin-bottom: 0.45rem;
}

.asgn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.4rem;
}

.asgn-row {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.45rem 0.75rem;
  border-radius: 5px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-left: 3px solid #ec3f3b;
}

.asgn-row-num {
  font-weight: 800;
  font-size: 0.9rem;
  min-width: 2.25rem;
  color: #1e293b;
}

.asgn-row-team {
  font-weight: 700;
  font-size: 0.8rem;
  color: #1565c0;
  min-width: 4rem;
}

.asgn-row-type {
  font-size: 0.78rem;
  color: #64748b;
}

.asgn-row-desc {
  font-size: 0.75rem;
  color: #94a3b8;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.asgn-empty {
  color: #94a3b8;
  font-size: 0.875rem;
  padding: 0.5rem 0;
}

/* ── Teams pager ── */
.teams-page {
  opacity: 1;
  transition: opacity 0.8s ease;
}

.teams-page.fading {
  opacity: 0;
}

.teams-pager-dots {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 5px 0 6px;
  flex-shrink: 0;
  border-top: 1px solid #e2e8f0;
}

.teams-pager-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #cbd5e1;
  transition: background 0.3s;
  flex-shrink: 0;
}

.teams-pager-dot.active {
  background: #475569;
}

/* ── No incident message ── */
.dash-no-incident {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  gap: 0.5rem;
  font-size: 1rem;
}

.dash-no-incident code {
  background: #f1f5f9;
  padding: 0.15rem 0.4rem;
  border-radius: 3px;
  font-size: 0.9rem;
}

/* ── Footer ── */
.dash-footer {
  background: #1e293b;
  color: #cbd5e1;
  height: 40px;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  flex-shrink: 0;
  font-size: 0.78rem;
  gap: 2rem;
}

.dash-footer-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.dash-footer-label { color: #64748b; }
.dash-footer-value { color: #e2e8f0; font-weight: 600; }

.dash-sync-pill {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.75rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  white-space: nowrap;
  background: #3db86a;
  color: #fff;
}

.dash-sync-pill.offline {
  background: #e05c4a;
}
</style>
</head>
<body>

<div class="dash-header">
  <div class="dash-logo">SAR Tools</div>
  <div class="dash-incident" id="dashIncidentName">—</div>
  <div class="dash-clock" id="dashClock"></div>
</div>

<div class="dash-offline-banner" id="dashOfflineBanner">Connection lost — attempting to reconnect…</div>

<div class="dash-main" id="dashMain">
</div>

<div class="dash-footer">
  <div class="dash-footer-item">
    <span class="dash-sync-pill" id="dashSyncPill">LIVE</span>
  </div>
  <div class="dash-footer-item">
    <span class="dash-footer-label">Personnel checked in</span>
    <span class="dash-footer-value" id="dashPersonnelCount">—</span>
  </div>
</div>

<script>
const params      = new URLSearchParams(location.search);
const INCIDENT    = (params.get("incidentName") || "").trim();
const enc         = encodeURIComponent;

// ── Clock (updates every second) ──
(function () {
  const el = document.getElementById("dashClock");
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");
    el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
})();

// ── No incident ──
if (!INCIDENT) {
  document.getElementById("dashMain").innerHTML =
    `<div class="dash-no-incident">
       <div>No incident specified.</div>
       <div>Add <code>?incidentName=…</code> to the URL.</div>
     </div>`;
} else {
  document.getElementById("dashIncidentName").textContent = INCIDENT;
  buildLayout();
  initDashboard();
}

function buildLayout() {
  document.getElementById("dashMain").innerHTML = `
    <div class="dash-panel dash-teams-col">
      <div class="dash-panel-header">
        <span class="dash-panel-title">Teams</span>
        <span class="dash-panel-count" id="dashTeamsCount"></span>
      </div>
      <div class="dash-panel-body" id="dashTeamsList"></div>
      <div class="teams-pager-dots" id="dashTeamsDots" style="display:none"></div>
    </div>
    <div class="dash-panel dash-asgn-col">
      <div class="dash-panel-header">
        <span class="dash-panel-title">Assignments</span>
        <span class="dash-panel-count" id="dashAsgnCount"></span>
      </div>
      <div class="dash-panel-body" id="dashAsgnBody"></div>
    </div>`;
}

// ── Status helpers ──
const STATUS_CSS = {
  "Out of Service":            "ts-oos",
  "Staged":                    "ts-staged",
  "Briefed":                   "ts-briefed",
  "Travelling to Assignment":  "ts-travelling",
  "On Assignment":             "ts-on",
  "Returning from Assignment": "ts-returning",
  "Awaiting Debrief":          "ts-debrief",
  "Retired":                   "ts-retired",
};

const STATUS_LABEL = {
  "Travelling to Assignment":  "Travelling To",
  "Returning from Assignment": "Returning From",
};

const ASGN_STATUSES = ["DRAFT", "PREPARED", "INPROGRESS", "COMPLETED"];
const ASGN_COLORS   = { DRAFT: "#5596fd", PREPARED: "#f68c21", INPROGRESS: "#ec3f3b", COMPLETED: "#901cfc" };
const ASGN_LABELS   = { DRAFT: "Draft", PREPARED: "Prepared", INPROGRESS: "In Progress", COMPLETED: "Completed" };

function esc(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}


// ── Teams pager ──
const teamPager = { pages: [], current: 0, timer: null, _fadeTimer: null };
const PAGE_INTERVAL_MS = 12000;
const FADE_MS = 800;

function updateDots(current, total) {
  const el = document.getElementById("dashTeamsDots");
  if (!el) return;
  if (total <= 1) { el.style.display = "none"; return; }
  el.style.display = "flex";
  el.innerHTML = Array.from({ length: total }, (_, i) =>
    `<div class="teams-pager-dot${i === current ? " active" : ""}"></div>`
  ).join("");
}

function showPage(idx, animate) {
  const listEl = document.getElementById("dashTeamsList");
  if (!listEl || !teamPager.pages.length) return;
  if (teamPager._fadeTimer) { clearTimeout(teamPager._fadeTimer); teamPager._fadeTimer = null; }
  const pageEl = listEl.querySelector(".teams-page");

  function setContent() {
    const html = teamPager.pages[idx] || "";
    if (pageEl) { pageEl.innerHTML = html; pageEl.classList.remove("fading"); }
    else { listEl.innerHTML = `<div class="teams-page">${html}</div>`; }
    updateDots(idx, teamPager.pages.length);
  }

  if (animate && pageEl) {
    pageEl.classList.add("fading");
    teamPager._fadeTimer = setTimeout(() => { setContent(); teamPager._fadeTimer = null; }, FADE_MS);
  } else {
    setContent();
  }
}

function startPager() {
  if (teamPager.timer) return;
  teamPager.timer = setInterval(() => {
    if (teamPager.pages.length <= 1) return;
    teamPager.current = (teamPager.current + 1) % teamPager.pages.length;
    showPage(teamPager.current, true);
  }, PAGE_INTERVAL_MS);
}

function stopPager() {
  if (teamPager.timer) { clearInterval(teamPager.timer); teamPager.timer = null; }
  if (teamPager._fadeTimer) { clearTimeout(teamPager._fadeTimer); teamPager._fadeTimer = null; }
}

// ── Render ──
function renderTeams(teams, assignments) {
  // Build lookup: team letter -> INPROGRESS assignment numbers
  const asgnByTeam = {};
  for (const a of assignments) {
    if ((a.status || "").toUpperCase() === "INPROGRESS" && a.team) {
      (asgnByTeam[a.team] = asgnByTeam[a.team] || []).push(a.number || a.id);
    }
  }

  const listEl  = document.getElementById("dashTeamsList");
  const countEl = document.getElementById("dashTeamsCount");
  if (!listEl) return;

  const active = teams.filter(t => t.status !== "Out of Service" && t.status !== "Retired");
  countEl.textContent = `${active.length} active · ${teams.length} total`;

  if (!teams.length) {
    stopPager();
    updateDots(0, 0);
    listEl.innerHTML = `<div class="asgn-empty">No teams created yet.</div>`;
    return;
  }

  const cards = teams.map(t => {  // array of card HTML strings
    const css     = STATUS_CSS[t.status] || "ts-oos";
    const tlName  = t.teamLeaderName || null;
    const manualTl = t.manualTl || null;
    const tlDisplay = tlName ? esc(tlName) : (manualTl ? `${esc(manualTl)} ⚡` : "—");

    const asgnNums  = asgnByTeam[t.name] || [];
    const manAsgn   = t.manualAssignment || null;
    const asgnDisplay = asgnNums.length
      ? esc(asgnNums.join(", "))
      : (manAsgn ? `${esc(manAsgn)} ⚡` : "—");

    const members = t.memberCount ?? 0;

    return `
      <div class="team-card ${css}">
        <div class="team-card-row">
          <span class="team-card-name">${esc(t.name)}</span>
          <span class="team-card-status">${esc(STATUS_LABEL[t.status] ?? t.status)}</span>
          <div class="team-card-details">
            <div class="team-card-detail team-card-detail-tl">
              <span class="team-card-detail-label">TL</span>
              <span class="team-card-detail-tl-value">${tlDisplay}</span>
            </div>
            <div class="team-card-detail team-card-detail-asgn">
              <span class="team-card-detail-label">Asgn</span>
              <span>${asgnDisplay}</span>
            </div>
            <div class="team-card-detail team-card-detail-members">
              <span class="team-card-detail-label" style="display:flex;align-items:center;"><svg width="9" height="9" viewBox="0 0 16 16" fill="#fff" style="opacity:0.65"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2 2H6a4 4 0 0 0-4 4v1h12v-1a4 4 0 0 0-4-4z"/></svg></span>
              <span>${members}</span>
            </div>
          </div>
        </div>
      </div>`;
  }); // array — not joined, pager slices and joins per-page

  // Measure one card to calculate how many fit per page
  const probe = document.createElement("div");
  probe.style.cssText = `position:fixed;top:-9999px;left:0;width:${listEl.clientWidth}px;pointer-events:none;`;
  probe.innerHTML = cards[0];
  document.body.appendChild(probe);
  const cardH = Math.max(1, (probe.firstElementChild?.offsetHeight ?? 40) + 3);
  document.body.removeChild(probe);

  function buildPages(availH) {
    const pp = Math.max(1, Math.floor(availH / cardH));
    const out = [];
    for (let i = 0; i < cards.length; i += pp) out.push(cards.slice(i, i + pp).join(""));
    return out;
  }

  // Recover the full panel body height regardless of whether dots are currently shown
  const dotsEl = document.getElementById("dashTeamsDots");
  const fullH = listEl.clientHeight + (dotsEl?.offsetHeight ?? 0);

  // First pass with full height; if dots are needed, second pass reserving their space
  let pages = buildPages(fullH);
  if (pages.length > 1) pages = buildPages(fullH - 20);

  teamPager.pages = pages;
  if (teamPager.current >= pages.length) teamPager.current = 0;

  // Refresh content without animation (data update, not page advance)
  showPage(teamPager.current, false);

  if (pages.length > 1 && !teamPager.timer) startPager();
  else if (pages.length <= 1) stopPager();
}

function renderAssignments(assignments) {
  const bodyEl  = document.getElementById("dashAsgnBody");
  const countEl = document.getElementById("dashAsgnCount");
  if (!bodyEl) return;

  countEl.textContent = `${assignments.length} total`;

  const counts = {};
  ASGN_STATUSES.forEach(s => counts[s] = 0);
  assignments.forEach(a => {
    const s = (a.status || "DRAFT").toUpperCase();
    if (s in counts) counts[s]++;
  });

  const inProgress = assignments
    .filter(a => (a.status || "").toUpperCase() === "INPROGRESS")
    .sort((a, b) => String(a.number ?? "").localeCompare(String(b.number ?? ""), undefined, { numeric: true }));

  bodyEl.innerHTML = `
    <div class="asgn-tiles">
      ${ASGN_STATUSES.map(s => `
        <div class="asgn-tile" style="background:${ASGN_COLORS[s]}">
          <span class="asgn-tile-count">${counts[s]}</span>
          <span class="asgn-tile-label">${ASGN_LABELS[s]}</span>
        </div>`).join("")}
    </div>
    ${inProgress.length ? `
      <div class="asgn-section-title">In Progress (${inProgress.length})</div>
      <div class="asgn-grid">
        ${inProgress.map(a => `
          <div class="asgn-row">
            <span class="asgn-row-num">${esc(a.number ?? "?")}</span>
            <span class="asgn-row-team">${a.team ? "Team " + esc(a.team) : ""}</span>
            <span class="asgn-row-type">${esc(a.resourceType || "")}</span>
            <span class="asgn-row-desc">${esc(a.description || "")}</span>
          </div>`).join("")}
      </div>` :
      `<div class="asgn-empty">No in-progress assignments.</div>`}`;
}

function renderPersonnel(personnel) {
  const checkedIn = personnel.filter(p => p.status === "Checked In").length;
  const el = document.getElementById("dashPersonnelCount");
  if (el) el.textContent = `${checkedIn} of ${personnel.length}`;
}

// ── Data fetching ──
let _settings = null;

async function fetchAll() {
  try {
    const sr = await fetch(`/api/incident/settings?incidentName=${enc(INCIDENT)}`);
    if (sr.ok) _settings = await sr.json();
  } catch {}

  const [tr, pr] = await Promise.allSettled([
    fetch(`/api/teams?incidentName=${enc(INCIDENT)}`),
    fetch(`/api/personnel?incidentName=${enc(INCIDENT)}`),
  ]);

  const teams     = (tr.status === "fulfilled" && tr.value.ok) ? await tr.value.json() : [];
  const personnel = (pr.status === "fulfilled" && pr.value.ok) ? await pr.value.json() : [];

  let assignments = [];
  if (_settings?.caltopoMapId) {
    try {
      const mode = _settings.caltopoMode || "online";
      const ar = await fetch(
        `/api/assignments?mapId=${enc(_settings.caltopoMapId)}&incidentName=${enc(INCIDENT)}&mode=${enc(mode)}`
      );
      if (ar.ok) assignments = await ar.json();
    } catch {}
  }

  renderTeams(teams, assignments);
  renderAssignments(assignments);
  renderPersonnel(personnel);

}

// ── SSE ──
function initDashboard() {
  fetchAll();

  const banner = document.getElementById("dashOfflineBanner");
  const pill   = document.getElementById("dashSyncPill");

  const sse = new EventSource(`/api/sync/stream?incidentName=${enc(INCIDENT)}`);

  sse.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (pill) { pill.textContent = "LIVE"; pill.classList.remove("offline"); }
    banner.classList.remove("visible");

    if (msg.type === "init" || msg.type === "sync") {
      _settings = null;
      fetchAll();
    }
  };

  sse.onerror = () => {
    if (pill) { pill.textContent = "Offline"; pill.classList.add("offline"); }
    banner.classList.add("visible");
  };
}
</script>

</body>
</html>
