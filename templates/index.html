<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="/static/icon.ico" type="image/x-icon">
<title>SAR Tools</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MGRS -->
<script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>

<!-- App CSS -->
<link rel="stylesheet" href="/static/css/main.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/table.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/message-bar.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/rectangle.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/console.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/assignments.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/personnel.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/teams.css?v={{ v }}">
<link rel="stylesheet" href="/static/css/home.css?v={{ v }}">



<!-- Core JS -->
<script src="/static/js/tabs.js?v={{ v }}" defer></script>
<script src="/static/js/logger.js?v={{ v }}" defer></script>
<script src="/static/js/console-toggle.js?v={{ v }}" defer></script>
<script src="/static/js/map-utils.js?v={{ v }}" defer></script>
<script src="/static/js/geometry-utils.js?v={{ v }}"></script>
<script type="module" src="/static/js/rectangle.js?v={{ v }}"></script>
<script type="module" src="/static/js/assignments.js?v={{ v }}"></script>
<script type="module" src="/static/js/personnel.js?v={{ v }}"></script>
<script type="module" src="/static/js/teams.js?v={{ v }}"></script>
<script type="module" src="/static/js/home.js?v={{ v }}"></script>
<script type="module" src="/static/js/global-sync.js?v={{ v }}"></script>




</head>

<body>

<div class="top-bar">

  <div class="tabs">
<button class="tab-button"
            onclick="openTab('home', this)">
      Home
    </button>

    <button class="tab-button"
            onclick="openTab('rectangle', this)">
      Rectangle Tool
    </button>

    <button class="tab-button"
            onclick="openTab('assignments', this)">
      Assignments
    </button>

    <button class="tab-button"
            onclick="openTab('personnel', this)">
      Personnel
    </button>

    <button class="tab-button"
            onclick="openTab('teams', this)">
      Teams
    </button>

    <button class="tab-button"
            id="consoleTabBtn"
            style="display:none"
            onclick="openTab('console', this)">
      Debug Console
    </button>
  </div>

  <!-- Right side controls -->
  <div class="top-bar-controls">

    <div id="sync-countdown" class="sync-countdown hidden"></div>

    <button id="sync-now-btn" class="sync-now-btn hidden">Sync Now</button>

    <button onclick="window.open('/help/help.pdf', '_blank')">Help</button>

  </div>

</div>




<div id="page">
  {% include "tabs/home.html" %}
  {% include "tabs/rectangle.html" %}
  {% include "tabs/assignments.html" %}
  {% include "tabs/personnel.html" %}
  {% include "tabs/teams.html" %}
  {% include "tabs/console.html" %}
</div>

</body>
</html>
