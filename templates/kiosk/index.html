<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Check-in Kiosk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f4f5f7;
      --card:    #ffffff;
      --border:  #d0d3d8;
      --accent:  #1a73e8;
      --green:   #1e8a45;
      --red:     #c0392b;
      --text:    #1a1a1a;
      --muted:   #666;
      --radius:  10px;
      --shadow:  0 2px 8px rgba(0,0,0,0.10);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      font-size: 16px;
    }

    #app {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Page header ── */
    .kiosk-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
      min-height: 36px;
    }
    .kiosk-title {
      flex: 1;
      font-size: 1.2rem;
      font-weight: 700;
    }
    /* Incident slot (replaces title when locked) */
    .header-incident {
      flex: 1;
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .header-incident.visible { display: flex; }
    .header-incident-name {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .change-btn {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .change-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 1.25rem;
      line-height: 1;
      border-radius: 6px;
      text-decoration: none;
    }
    .settings-btn:hover { background: rgba(0,0,0,0.06); }

    /* ── Offline veil ── */
    .offline-veil {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(180, 180, 180, 0.55);
      z-index: 100;
      cursor: not-allowed;
    }
    .offline-veil.show { display: block; }
    .kiosk-header { position: relative; z-index: 200; }

    /* ── Live/offline pill (matches .sync-pill in main tool) ── */
    .conn-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem 0.75rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
      line-height: 1;
      background: #3db86a;
      color: #fff;
    }
    .conn-pill.offline { background: #e05c4a; }


    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    /* ── Toggle (Check In / Check Out) ── */
    .toggle-group {
      display: flex;
      background: var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .toggle-btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .toggle-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    #toggleCheckin.active  { background: #d4edda; color: #155724; }
    #toggleCheckout.active { background: #fde8e6; color: #9b2c1f; }

    /* ── Incident picker ── */
    .picker-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .picker-select {
      width: 100%;
      font-size: 1rem;
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fafafa;
      appearance: auto;
      margin-bottom: 12px;
    }
    .picker-select:focus { outline: none; border-color: var(--accent); }

    /* ── Search ── */
    .search-input {
      width: 100%;
      font-size: 1.05rem;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: #fafafa;
    }
    .search-input:focus { border-color: var(--accent); background: #fff; }

    .search-results {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .result-row {
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-row:active, .result-row:hover { border-color: var(--accent); background: #f0f5ff; }
    .result-row.already-in { background: #f0f0f0; border-color: #ccc; opacity: 0.75; cursor: default; }
    .result-row.already-in:hover { background: #f0f0f0; border-color: #ccc; }
    .result-row-text { flex: 1; min-width: 0; }
    .result-name { font-weight: 600; font-size: 1rem; }
    .result-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .result-checked-in {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .manual-row {
      padding: 11px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
    }
    .manual-row:active, .manual-row:hover { background: #f0f5ff; border-color: var(--accent); }

    /* ── Form fields ── */
    .form-section-title {
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field-label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .field-label input {
      width: 100%;
      font-size: 1rem;
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: #fafafa;
    }
    .field-label input:focus  { border-color: var(--accent); background: #fff; }
    .field-label input:disabled { background: #f0f0f0; color: #888; }
    .plate-note {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: -4px;
    }

    /* ── Buttons ── */
    .primary-btn {
      width: 100%;
      padding: 13px;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: background 0.12s;
    }
    .primary-btn:hover { background: #1558b5; }
    .primary-btn:disabled { background: #aaa; cursor: not-allowed; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--green);
      color: #fff;
      transition: background 0.12s;
    }
    .submit-btn:hover   { background: #176e38; }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
    .submit-btn.checkout { background: var(--accent); }
    .submit-btn.checkout:hover { background: #1558b5; }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      text-align: left;
    }

    /* ── Status messages ── */
    .status-msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
    }
    .status-msg.show    { display: block; }
    .status-msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status-msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .status-msg.info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

    /* ── Success screen ── */
    .confirm-icon { font-size: 3rem; text-align: center; margin-bottom: 8px; }
    .confirm-msg  { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .confirm-sub  { font-size: 0.9rem; color: var(--muted); text-align: center; }

    /* ── Section visibility ── */
    .section { display: none; }
    .section.visible { display: flex; flex-direction: column; gap: 14px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header (always visible) -->
  <div class="kiosk-header">
    <div class="kiosk-title" id="kioskTitle">Check-in Kiosk</div>
    <div class="header-incident" id="headerIncident">
      <div class="header-incident-name" id="lockedIncidentName"></div>
      <button class="change-btn" id="changeIncidentBtn">Change</button>
    </div>
    <span class="conn-pill offline" id="connPill">Offline</span>
    <a href="/checkin/admin" class="settings-btn" title="Admin / Settings">⚙</a>
  </div>

  <!-- ══ PICKER SECTION ══ -->
  <div class="section visible" id="pickerSection">
    <div class="card">
      <div class="picker-label">Select an incident to begin</div>
      <select id="incidentPicker" class="picker-select">
        <option value="">Loading incidents…</option>
      </select>
      <button class="primary-btn" id="startBtn" disabled>Start Check-in</button>
    </div>
    <div id="pickerStatus" class="status-msg"></div>
  </div>

  <!-- ══ KIOSK SECTION (shown once incident locked) ══ -->
  <div class="section" id="kioskSection">

    <!-- Check In / Check Out toggle -->
    <div class="toggle-group">
      <button class="toggle-btn active" id="toggleCheckin">Check In</button>
      <button class="toggle-btn" id="toggleCheckout">Check Out</button>
    </div>

    <!-- SEARCH -->
    <div class="section visible" id="searchSection">
      <div class="card">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by name, phone, or member #"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          inputmode="search"
        />
        <div class="manual-row" id="manualEntryStatic" style="margin-top:8px;">Enter manually</div>
        <div class="search-results" id="searchResults"></div>
      </div>
      <div id="searchStatus" class="status-msg"></div>
    </div>

    <!-- DETAIL FORM -->
    <div class="section" id="detailSection">
      <button class="back-btn" id="backBtn">← Back to search</button>
      <div class="card">
        <div class="form-section-title">Your Information</div>
        <div class="field-group">
          <label class="field-label">
            Name
            <input type="text" id="fieldName" autocomplete="name" />
          </label>
          <label class="field-label">
            Phone
            <input type="tel" id="fieldPhone" autocomplete="tel" placeholder="Optional" />
          </label>
          <label class="field-label">
            Email
            <input type="email" id="fieldEmail" autocomplete="email" placeholder="Optional" />
          </label>
          <label class="field-label">
            Emergency Contact Name
            <input type="text" id="fieldEcName" autocomplete="off" placeholder="Optional" />
          </label>
          <label class="field-label">
            Emergency Contact Phone
            <input type="tel" id="fieldEcPhone" autocomplete="off" placeholder="Optional" />
          </label>
          <label class="field-label">
            License Plate
            <input type="text" id="fieldPlate" autocomplete="off" placeholder="e.g. ABC 123" style="text-transform:uppercase" />
          </label>
          <p class="plate-note">Plate is saved to your profile for future check-ins.</p>
        </div>
      </div>
      <div id="detailStatus" class="status-msg"></div>
      <button class="submit-btn" id="submitBtn">Check In</button>
    </div>

    <!-- SUCCESS -->
    <div class="section" id="successSection">
      <div class="card">
        <div class="confirm-icon" id="confirmIcon">✅</div>
        <div class="confirm-msg" id="confirmMsg">Checked in!</div>
        <div class="confirm-sub" id="confirmSub"></div>
      </div>
      <button class="submit-btn" id="doneBtn" style="background:#555;">Done (next person)</button>
    </div>

  </div><!-- /kioskSection -->

</div><!-- /app -->
<div class="offline-veil" id="offlineVeil"></div>

<script>
(function () {
  const STORAGE_KEY = "kiosk_incident";

  let incidentName  = "";
  let action        = "checkin";
  let selectedMember = null;

  function $(id) { return document.getElementById(id); }

  // ── Section helpers ──
  // Top-level: pickerSection vs kioskSection
  function showTop(id) {
    ["pickerSection", "kioskSection"].forEach(s => {
      $(s).classList.toggle("visible", s === id);
    });
  }
  // Within kiosk: search / detail / success
  function showKiosk(id) {
    ["searchSection", "detailSection", "successSection"].forEach(s => {
      $(s).classList.toggle("visible", s === id);
    });
  }

  function showMsg(id, text, type) {
    const el = $(id);
    if (!el) return;
    el.textContent = text;
    el.className = `status-msg show ${type}`;
  }
  function clearMsg(id) {
    const el = $(id);
    if (el) el.className = "status-msg";
  }

  // ── Incident picker ──
  async function loadIncidents() {
    try {
      const res  = await fetch("/api/get_incidents");
      const data = await res.json().catch(() => ({}));
      const list = data.incidents || [];
      const sel  = $("incidentPicker");
      sel.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = "";
      ph.textContent = list.length ? "— Select an incident —" : "No incidents found";
      sel.appendChild(ph);
      for (const inc of list) {
        const opt = document.createElement("option");
        opt.value = inc.incidentName;
        opt.textContent = inc.incidentName;
        sel.appendChild(opt);
      }
      $("startBtn").disabled = false;
    } catch (e) {
      showMsg("pickerStatus", `Failed to load incidents: ${e.message}`, "error");
    }
  }

  $("incidentPicker").addEventListener("change", () => {
    $("startBtn").disabled = !$("incidentPicker").value;
  });

  $("startBtn").addEventListener("click", () => {
    const val = $("incidentPicker").value;
    if (!val) return;
    lockIncident(val);
  });

  function lockIncident(name) {
    incidentName = name;
    localStorage.setItem(STORAGE_KEY, name);
    $("lockedIncidentName").textContent = name;
    $("kioskTitle").style.display    = "none";
    $("headerIncident").classList.add("visible");
    showTop("kioskSection");
    resetToSearch();  // also calls setManualStatic(true)
  }

  function unlockIncident() {
    incidentName = "";
    localStorage.removeItem(STORAGE_KEY);
    $("kioskTitle").style.display = "";
    $("headerIncident").classList.remove("visible");
    $("incidentPicker").value = "";
    $("startBtn").disabled = true;
    showTop("pickerSection");
    resetToSearch();
  }

  // ── Change incident (two-step via confirm dialog) ──
  $("changeIncidentBtn").addEventListener("click", () => {
    if (!confirm("Change incident?\n\nThis will return to the incident picker. The current session will end.")) return;
    unlockIncident();
  });

  // ── Check In / Check Out toggle ──
  $("toggleCheckin").addEventListener("click", () => {
    action = "checkin";
    $("toggleCheckin").classList.add("active");
    $("toggleCheckout").classList.remove("active");
    $("submitBtn").textContent = "Check In";
    $("submitBtn").classList.remove("checkout");
    resetToSearch();
  });
  $("toggleCheckout").addEventListener("click", () => {
    action = "checkout";
    $("toggleCheckout").classList.add("active");
    $("toggleCheckin").classList.remove("active");
    $("submitBtn").textContent = "Check Out";
    $("submitBtn").classList.add("checkout");
    resetToSearch();
  });

  // ── Search ──
  function setManualStatic(visible) {
    $("manualEntryStatic").style.display = (action === "checkin" && visible) ? "" : "none";
  }

  let searchTimer = null;
  $("searchInput").addEventListener("input", () => {
    clearTimeout(searchTimer);
    const q = $("searchInput").value.trim();
    if (q.length < 2) {
      $("searchResults").innerHTML = "";
      setManualStatic(true);
      return;
    }
    setManualStatic(false);
    searchTimer = setTimeout(() => doSearch(q), 220);
  });

  $("manualEntryStatic").addEventListener("click", () => selectManual($("searchInput").value.trim()));

  async function doSearch(q) {
    try {
      let url;
      if (action === "checkout") {
        url = `/api/kiosk/incident-search?incidentName=${encodeURIComponent(incidentName)}&q=${encodeURIComponent(q)}`;
      } else {
        url = `/api/kiosk/search?q=${encodeURIComponent(q)}&incidentName=${encodeURIComponent(incidentName)}`;
      }
      const res  = await fetch(url);
      const data = await res.json().catch(() => []);
      renderResults(data, q);
    } catch { renderResults([], q); }
  }

  function renderResults(rows, q) {
    const container = $("searchResults");
    container.innerHTML = "";
    for (const r of rows) {
      const div = document.createElement("div");
      div.className = "result-row" + (r.checkedIn ? " already-in" : "");
      const meta = [r.memberRef, r.phone].filter(Boolean).join(" · ");
      div.innerHTML = `
        <div class="result-row-text">
          <div class="result-name">${esc(r.name)}</div>
          ${meta ? `<div class="result-meta">${esc(meta)}</div>` : ""}
        </div>
        ${r.checkedIn ? `<div class="result-checked-in">Already checked in</div>` : ""}
      `;
      if (!r.checkedIn) div.addEventListener("click", () => selectMember(r));
      container.appendChild(div);
    }
    // Manual entry only available for check-in
    if (action === "checkin") {
      const manual = document.createElement("div");
      manual.className = "manual-row";
      manual.textContent = rows.length ? "Enter manually" : "Not found — enter manually";
      manual.addEventListener("click", () => selectManual(q));
      container.appendChild(manual);
    } else if (!rows.length) {
      const none = document.createElement("div");
      none.style.cssText = "padding:10px 12px;color:var(--muted);font-size:0.9rem;text-align:center;";
      none.textContent = "No checked-in personnel match that search.";
      container.appendChild(none);
    }
  }

  function selectMember(r) {
    selectedMember = r;
    populateDetail(r);
    showKiosk("detailSection");
    clearMsg("detailStatus");
  }

  function selectManual(name) {
    selectedMember = null;
    populateDetail({ name });
    $("fieldName").readOnly = false;
    showKiosk("detailSection");
    clearMsg("detailStatus");
  }

  function populateDetail(r) {
    $("fieldName").value    = r.name         || "";
    $("fieldPhone").value   = r.phone        || "";
    $("fieldEmail").value   = r.email        || "";
    $("fieldEcName").value  = r.ecName       || "";
    $("fieldEcPhone").value = r.ecPhone      || "";
    $("fieldPlate").value   = r.licensePlate || "";
    $("fieldName").readOnly = !!selectedMember;
  }

  $("backBtn").addEventListener("click", resetToSearch);

  function resetToSearch() {
    selectedMember = null;
    $("searchInput").value = "";
    $("searchResults").innerHTML = "";
    setManualStatic(true);
    clearMsg("searchStatus");
    clearMsg("detailStatus");
    showKiosk("searchSection");
    if ($("kioskSection").classList.contains("visible")) {
      setTimeout(() => $("searchInput").focus(), 50);
    }
  }

  // ── Submit ──
  $("submitBtn").addEventListener("click", doSubmit);

  async function doSubmit() {
    const name = $("fieldName").value.trim();
    if (!name) { showMsg("detailStatus", "Name is required.", "error"); return; }

    $("submitBtn").disabled = true;
    clearMsg("detailStatus");

    const body = {
      incidentName,
      action,
      name,
      phone:        $("fieldPhone").value.trim()   || null,
      email:        $("fieldEmail").value.trim()   || null,
      ecName:       $("fieldEcName").value.trim()  || null,
      ecPhone:      $("fieldEcPhone").value.trim() || null,
      licensePlate: $("fieldPlate").value.trim().toUpperCase() || null,
      memberId:     selectedMember?.id ?? null,
    };

    try {
      const res  = await fetch("/api/kiosk/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`);
      showSuccess(name);
    } catch (err) {
      showMsg("detailStatus", `Failed: ${err.message}`, "error");
    } finally {
      $("submitBtn").disabled = false;
    }
  }

  function showSuccess(name) {
    const verb = action === "checkin" ? "checked in" : "checked out";
    $("confirmIcon").textContent = action === "checkin" ? "✅" : "👋";
    $("confirmMsg").textContent  = `${name} ${verb}!`;
    $("confirmSub").textContent  = incidentName;
    showKiosk("successSection");
  }

  $("doneBtn").addEventListener("click", resetToSearch);

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  // ── Live/offline pill ──
  const pill = $("connPill");
  function setOnline(yes) {
    pill.textContent = yes ? "LIVE" : "Offline";
    pill.className   = `conn-pill${yes ? "" : " offline"}`;
    $("offlineVeil").classList.toggle("show", !yes);
  }
  async function checkHealth() {
    try {
      const res = await fetch("/health", { cache: "no-store" });
      setOnline(res.ok);
    } catch { setOnline(false); }
  }
  checkHealth();
  setInterval(checkHealth, 12000);

  // ── Boot ──
  // If URL has ?incidentName= honour it (deep-link / dashboard copy), otherwise
  // check localStorage for a previously-locked incident.
  const params = new URLSearchParams(location.search);
  const urlIncident = params.get("incidentName") || "";

  loadIncidents().then(() => {
    const saved = urlIncident || localStorage.getItem(STORAGE_KEY) || "";
    if (saved) {
      // Only restore if that incident still exists in the picker
      const opt = Array.from($("incidentPicker").options).find(o => o.value === saved);
      if (opt) {
        $("incidentPicker").value = saved;
        lockIncident(saved);
        return;
      }
    }
    showTop("pickerSection");
  });

})();
</script>
</body>
</html>
